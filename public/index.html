<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Not Jeopardy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Not Jeopardy</h1>
    <button id="cheat-btn">Cheat</button>
  </header>

  <div id="cheat-overlay" class="hidden"></div>
  <div id="cheat-modal" class="hidden">
    <div id="cheat-inner">
      <div id="cheat-title">Cheat Codes</div>
      <button id="cheat-double-jeopardy">Skip to Double Jeopardy</button>
      <button id="cheat-final-jeopardy">Skip to Final Jeopardy</button>
      <button id="cheat-end-game">End Game Now</button>
      <button id="cheat-close">Close</button>
    </div>
  </div>

  <div id="top-strip">
    <div id="host-card">
      <div class="player-avatar">
        <img id="host-portrait" src="/images/host.png" alt="Chuck Pendleton" class="player-avatar-img">
      </div>
      <div id="host-speaker">CHUCK PENDLETON</div>
      <div id="host-line"></div>
    </div>
    <div id="scoreboard"></div>
  </div>

  <main>
    <div id="board"></div>
  </main>

  <!-- Player Selection Modal -->
  <div id="player-select-overlay"></div>
  <div id="player-select-modal">
    <div id="player-select-inner">
      <div id="player-select-title">CHOOSE YOUR OPPONENTS</div>
      <p id="player-select-subtitle">Select exactly 2 AI players to compete against</p>
      <div id="player-select-grid"></div>
      <button id="player-select-start" disabled>Start Game</button>
    </div>
  </div>

  <div id="loading-screen" class="hidden">
    <div id="loading-inner">
      <div class="spinner"></div>
      <p>Generating board…</p>
    </div>
  </div>

  <!-- Clue Modal -->
  <div id="overlay" class="hidden"></div>
  <div id="modal" class="hidden" role="dialog" aria-modal="true">
    <div id="modal-inner">

      <!-- Persistent clue header (hidden during bet phase) -->
      <div id="clue-header" class="hidden">
        <p id="category-label"></p>
        <div id="clue-text"></div>
        <hr id="clue-divider" />
      </div>

      <!-- Phase Daily Double: wager -->
      <div id="phase-bet" class="hidden">
        <div id="daily-double-banner">DAILY DOUBLE!</div>
        <p id="bet-instruction"></p>
        <div id="bet-form">
          <input type="number" id="bet-input" placeholder="Your wager" min="1" />
          <button id="bet-submit-btn">Place Wager</button>
        </div>
        <div id="ai-bet-display" class="hidden"></div>
      </div>

      <!-- Phase 1: Clue + buzz button -->
      <div id="phase-clue">
        <div id="buzz-timer-track"><div id="buzz-timer-bar"></div></div>
        <button id="buzz-btn" class="locked">BUZZ IN</button>
      </div>

      <!-- Phase 2: Listening + countdown -->
      <div id="phase-listen" class="hidden">
        <div class="mic-icon">🎤</div>
        <div id="listening-label">Listening…</div>
        <div id="countdown-ring">
          <svg viewBox="0 0 100 100">
            <circle class="bg" cx="50" cy="50" r="44"/>
            <circle id="ring-progress" class="fg" cx="50" cy="50" r="44"/>
          </svg>
          <span id="countdown-num">5</span>
        </div>
        <div id="transcript-display"></div>
      </div>

      <!-- Phase Clarify: needs more specific answer -->
      <div id="phase-clarify" class="hidden">
        <div id="clarify-header">Be more specific.</div>
        <div id="clarify-original"></div>
        <div class="mic-icon">🎤</div>
        <div id="clarify-countdown-ring">
          <svg viewBox="0 0 100 100">
            <circle class="bg" cx="50" cy="50" r="44"/>
            <circle id="clarify-ring-progress" class="fg" cx="50" cy="50" r="44"/>
          </svg>
          <span id="clarify-countdown-num">4</span>
        </div>
        <div id="clarify-transcript-display"></div>
      </div>

      <!-- Phase AI: AI buzzed in -->
      <div id="phase-ai" class="hidden">
        <div id="ai-buzz-name"></div>
        <div id="ai-buzz-status"></div>
        <div id="ai-answer-reveal" class="hidden"></div>
      </div>

      <!-- Phase 3: Judging spinner -->
      <div id="phase-judging" class="hidden">
        <div class="spinner"></div>
        <p>Judging…</p>
      </div>

      <!-- Phase 4: Result -->
      <div id="phase-result" class="hidden">
        <div id="result-badge"></div>
        <div id="result-message"></div>
        <div id="correct-answer-reveal"></div>
        <button id="continue-btn">Continue</button>
      </div>

    </div>
  </div>

  <div id="game-over" class="hidden"></div>

  <!-- Double Jeopardy transition -->
  <div id="dj-transition" class="hidden">
    <div class="fj-logo" id="dj-banner">DOUBLE JEOPARDY!</div>
    <div id="dj-subtitle">Values are now doubled</div>
    <div id="dj-scores"></div>
  </div>

  <!-- Final Jeopardy -->
  <div id="fj-screen" class="hidden">

    <!-- Phase 1: loading / category reveal -->
    <div id="fj-phase-reveal" class="fj-phase">
      <div class="fj-logo">FINAL JEOPARDY!</div>
      <div id="fj-reveal-cat"></div>
      <div id="fj-reveal-sub"></div>
    </div>

    <!-- Phase 2: wager -->
    <div id="fj-phase-wager" class="fj-phase hidden">
      <div class="fj-logo">FINAL JEOPARDY!</div>
      <div id="fj-wager-cat"></div>
      <div id="fj-wager-grid"></div>
      <div id="fj-human-form">
        <p id="fj-wager-instr"></p>
        <input type="number" id="fj-wager-input" placeholder="Your wager" min="0" />
        <button id="fj-wager-btn">Lock In Wager</button>
      </div>
    </div>

    <!-- Phase 3: clue + listening -->
    <div id="fj-phase-clue" class="fj-phase hidden">
      <div id="fj-clue-cat"></div>
      <div id="fj-clue-text"></div>
      <div id="fj-clue-timer-row">
        <div id="fj-timer-track"><div id="fj-timer-bar"></div></div>
        <span id="fj-timer-num">30</span>
      </div>
      <div id="fj-clue-status"></div>
      <div id="fj-clue-transcript"></div>
    </div>

    <!-- Phase 4: answer reveal -->
    <div id="fj-phase-answers" class="fj-phase hidden">
      <div class="fj-logo">FINAL JEOPARDY!</div>
      <div id="fj-answer-cards"></div>
      <div id="fj-answer-correct"></div>
      <button id="fj-continue-btn" class="hidden">See Final Scores</button>
    </div>

  </div>

  <script src="game.js"></script>
</body>
</html>
